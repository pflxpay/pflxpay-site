<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFLX Pay</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#050816;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
}

/* LOGO (DOĞRU KULLANIM) */
.logo img{
  height:60px;   /* NORMAL ve DÜZGÜN */
  width:auto;
}

/* MENU */
.menu{
  display:flex;
  gap:40px;
  color:#ccc;
  font-size:16px;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:60px;
}

.hero h1{
  font-size:48px;
}

.hero p{
  color:#aaa;
  margin:15px 0 25px;
}

.hero button{
  padding:14px 26px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
}

/* CARD */
.card{
  margin:50px auto;
  width:340px;
  padding:25px;
  border-radius:18px;
  background:#0b1220;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="menu">
    <span>Features</span>
    <span>How it works</span>
    <span>Use cases</span>
  </div>
</div>

<div class="hero">
  <h1>Get paid globally</h1>
  <p>Simple crypto payments</p>
  <button>Start Now</button>
</div>

<div class="card">
  Payment Preview
</div>

</body>
</html>
