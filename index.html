<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFLX Pay</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background:#050816;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 60px;
}

/* LOGO */
.logo img{
  height:70px;   /* 🔥 temiz ve ideal boyut */
  width:auto;
}

/* MENU */
.menu{
  display:flex;
  gap:40px;
  align-items:center;
  color:#ccc;
  font-size:15px;
}

.menu span{
  cursor:pointer;
  transition:0.2s;
}

.menu span:hover{
  color:#fff;
}

/* BUTTON */
.btn{
  padding:10px 18px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

/* HERO */
.hero{
  text-align:center;
  margin-top:80px;
  padding:0 20px;
}

.hero h1{
  font-size:56px;
  font-weight:600;
}

.hero p{
  color:#aaa;
  margin:18px 0 30px;
  font-size:18px;
}

.hero button{
  padding:14px 28px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* CARD */
.card{
  margin:70px auto;
  width:380px;
  padding:30px;
  border-radius:20px;
  background:#0b1220;
  text-align:center;
  color:#aaa;
}

/* MOBILE */
@media(max-width:768px){
  .header{
    padding:16px 20px;
  }

  .menu{
    gap:15px;
    font-size:13px;
  }

  .logo img{
    height:50px;
  }

  .hero h1{
    font-size:36px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="menu">
    <span>Features</span>
    <span>How it works</span>
    <span>Use cases</span>
    <span class="btn">Join Waitlist</span>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Get paid globally</h1>
  <p>Simple crypto payments for freelancers</p>
  <button>Start Now</button>
</div>

<!-- CARD -->
<div class="card">
  Payment Preview
</div>

</body>
</html>
