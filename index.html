<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFLX Pay</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#050816;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 40px;
  background:#050816;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo img{
  height:50px;
}

.menu{
  display:flex;
  gap:30px;
  color:#ccc;
}

.right{
  display:flex;
  gap:15px;
  align-items:center;
}

.btn{
  padding:10px 18px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
}

.btn.primary{
  background:#2563eb;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h1{
  font-size:48px;
  margin-bottom:15px;
}

.hero p{
  color:#aaa;
  margin-bottom:25px;
}

.hero button{
  padding:14px 26px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:16px;
}

/* CARD */
.card{
  margin:40px auto;
  width:320px;
  padding:20px;
  border-radius:20px;
  background:#0b1220;
  border:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="menu">
    <span>Features</span>
    <span>How it works</span>
    <span>Use cases</span>
  </div>

  <div class="right">
    <span>EN • TR • RU</span>
    <div class="btn primary">Join</div>
  </div>
</div>

<div class="hero">
  <h1>Get paid globally</h1>
  <p>Simple crypto payments for freelancers</p>
  <button>Start Now</button>
</div>

<div class="card">
  Payment Preview
</div>

</body>
</html>
