<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFLX Pay</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:#050816;
  color:#fff;
}

.container{
  max-width:900px;
  margin:60px auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:40px;
  font-size:40px;
}

.form{
  background:#0b1220;
  padding:25px;
  border-radius:20px;
}

input,select{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#08101d;
  color:#fff;
}

textarea{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#08101d;
  color:#fff;
}

button{
  margin-top:15px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.copy{
  background:#333;
}

.linkbox{
  margin-top:20px;
  padding:15px;
  background:#08101d;
  border-radius:10px;
  word-break:break-all;
}

.preview{
  margin-top:30px;
  background:#0b1220;
  padding:20px;
  border-radius:20px;
}

.preview h2{
  margin-bottom:10px;
}

.amount{
  font-size:32px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>PFLX Pay</h1>

<div class="form">

<label>Amount</label>
<input id="amount" placeholder="100">

<label>Currency</label>
<select id="currency">
<option>USDT</option>
</select>

<label>Title</label>
<input id="title" placeholder="Logo design payment">

<label>Description</label>
<textarea id="desc">Payment for service</textarea>

<button onclick="generate()">Generate Link</button>

<button class="copy" onclick="copyLink()">Copy Link</button>

<div class="linkbox" id="link"></div>

</div>

<div class="preview">

<h2>Payment Preview</h2>

<div class="amount" id="pAmount">0 USDT</div>
<p id="pTitle"></p>

</div>

</div>

<script>

function generate(){
  const amount=document.getElementById("amount").value;
  const currency=document.getElementById("currency").value;
  const title=document.getElementById("title").value;
  const desc=document.getElementById("desc").value;

  const link = `pay.html?amount=${amount}&currency=${currency}&title=${encodeURIComponent(title)}&description=${encodeURIComponent(desc)}`;

  document.getElementById("link").innerText = location.origin + "/" + link;

  // preview
  document.getElementById("pAmount").innerText = amount + " " + currency;
  document.getElementById("pTitle").innerText = title;
}

function copyLink(){
  const text = document.getElementById("link").innerText;
  navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
