<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFLX Pay</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#050816;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
}

/* LOGO */
.logo img{
  height:90px;
}

/* MENU */
.menu{
  display:flex;
  gap:30px;
  color:#ccc;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:40px;
}

.hero h1{
  font-size:42px;
}

.hero p{
  color:#aaa;
  margin:10px 0 20px;
}

.hero button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

/* CARD */
.card{
  margin:40px auto;
  width:300px;
  padding:20px;
  border-radius:15px;
  background:#0b1220;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <!-- 🔥 BURASI ÇÖZÜM -->
    <img src="logo.png" style="height:90px; filter: brightness(0) invert(1);">
  </div>

  <div class="menu">
    <span>Features</span>
    <span>How it works</span>
    <span>Use cases</span>
  </div>
</div>

<div class="hero">
  <h1>Get paid globally</h1>
  <p>Simple crypto payments</p>
  <button>Start Now</button>
</div>

<div class="card">
  Payment Preview
</div>

</body>
</html>
