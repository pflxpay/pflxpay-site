<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFLX Pay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#050816;color:#fff}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo img{height:70px}
.menu{display:flex;gap:24px;align-items:center}
.menu a{color:#cbd5e1;text-decoration:none}
.btn{padding:10px 18px;border-radius:10px;background:rgba(255,255,255,.06)}
.hero{text-align:center;margin-top:70px;padding:0 20px}
.hero h1{font-size:56px}
.hero p{color:#94a3b8;margin:18px 0 30px;font-size:18px}
.hero button,.primary{background:#2563eb;color:#fff;border:none;border-radius:12px;padding:14px 22px;cursor:pointer}
.card{max-width:760px;margin:45px auto;padding:30px;background:#0b1220;border-radius:22px;border:1px solid rgba(255,255,255,.06)}
.card h2{text-align:center;margin-bottom:10px}
.card p{text-align:center;color:#94a3b8;margin-bottom:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:8px}
.full{grid-column:1/-1}
input,textarea,select{background:#050816;color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px;font-size:15px}
textarea{min-height:110px}
.actions{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap}
.secondary{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 22px;cursor:pointer}
.result{margin-top:20px;background:#08101d;border-radius:16px;padding:18px;word-break:break-all;color:#93c5fd}
.preview{margin-top:24px;background:#08101d;border-radius:18px;padding:22px}
.preview strong{display:block;margin-bottom:12px}
.amount{font-size:34px;font-weight:bold;margin-bottom:10px}
.msg{margin-top:12px;color:#22c55e}
.footer{text-align:center;color:#64748b;padding:40px}
@media(max-width:768px){.header{flex-direction:column;gap:16px}.logo img{height:55px}.hero h1{font-size:36px}.grid{grid-template-columns:1fr}.card{width:calc(100% - 24px)}}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><img src="logo.png" alt="PFLX Pay"></div>
  <div class="menu">
    <a href="#mvp">Create Link</a>
    <a href="admin.html" class="btn">Admin Panel</a>
  </div>
</div>

<div class="hero">
  <h1>Get paid globally</h1>
  <p>Simple crypto payments for freelancers</p>
  <button onclick="document.getElementById('mvp').scrollIntoView({behavior:'smooth'})">Start Now</button>
</div>

<div class="card" id="mvp">
  <h2>Create a payment link</h2>
  <p>Build your first PFLX Pay payment request in seconds.</p>

  <div class="grid">
    <div class="field">
      <label>Amount</label>
      <input type="number" id="amount" placeholder="100">
    </div>

    <div class="field">
      <label>Currency</label>
      <select id="currency">
        <option value="USDT">USDT</option>
      </select>
    </div>

    <div class="field full">
      <label>Title</label>
      <input type="text" id="title" placeholder="Logo Design Payment">
    </div>

    <div class="field full">
      <label>Description</label>
      <textarea id="description" placeholder="Payment for logo design package and revisions"></textarea>
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="generatePaymentLink()">Generate Link</button>
    <button class="secondary" onclick="copyPaymentLink()">Copy Link</button>
  </div>

  <div class="result" id="paymentLink">Generate a link to see it here.</div>
  <div class="msg" id="copyMessage"></div>

  <div class="preview">
    <strong>Payment Preview</strong>
    <div class="amount" id="previewAmount">0 USDT</div>
    <div id="previewDescription">Your payment request preview will appear here.</div>
  </div>
</div>

<div class="footer">PFLX Pay © 2026</div>

<script>
function generatePaymentLink(){
  const amount=document.getElementById("amount").value.trim();
  const currency=document.getElementById("currency").value;
  const title=document.getElementById("title").value.trim();
  const description=document.getElementById("description").value.trim();

  if(!amount || !title){
    document.getElementById("copyMessage").style.color="#ef4444";
    document.getElementById("copyMessage").textContent="Please enter amount and title.";
    return;
  }

  const url="https://getpflxpay.com/pay.html?amount="+encodeURIComponent(amount)+
  "&currency="+encodeURIComponent(currency)+
  "&title="+encodeURIComponent(title)+
  "&description="+encodeURIComponent(description);

  document.getElementById("paymentLink").textContent=url;
  document.getElementById("previewAmount").textContent=amount+" "+currency;
  document.getElementById("previewDescription").textContent=title+(description?" — "+description:"");
  document.getElementById("copyMessage").textContent="";
}

async function copyPaymentLink(){
  const text=document.getElementById("paymentLink").textContent;
  if(text==="Generate a link to see it here.") return;
  await navigator.clipboard.writeText(text);
  document.getElementById("copyMessage").style.color="#22c55e";
  document.getElementById("copyMessage").textContent="✅ Link copied.";
}
</script>

</body>
</html>
