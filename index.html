<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PFLX Pay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #050816;
      color: #fff;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      gap: 20px;
    }

    .logo img {
      height: 70px;
      width: auto;
      display: block;
    }

    .menu {
      display: flex;
      gap: 28px;
      align-items: center;
      color: #cbd5e1;
      font-size: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu a {
      color: #cbd5e1;
      text-decoration: none;
      transition: 0.2s;
    }

    .menu a:hover {
      color: #fff;
    }

    .btn-link {
      padding: 10px 18px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .hero {
      text-align: center;
      margin-top: 70px;
      padding: 0 20px;
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 700;
    }

    .hero p {
      color: #94a3b8;
      margin: 18px 0 30px;
      font-size: 18px;
    }

    .hero button {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .card {
      margin: 60px auto 30px auto;
      width: 380px;
      max-width: calc(100% - 32px);
      padding: 30px;
      border-radius: 20px;
      background: #0b1220;
      text-align: center;
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .waitlist {
      margin: 40px auto 80px auto;
      width: 100%;
      max-width: 560px;
      padding: 28px;
      border-radius: 20px;
      background: #0b1220;
      border: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }

    .waitlist h2 {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .waitlist p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row input {
      flex: 1;
      height: 52px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #050816;
      color: #fff;
      outline: none;
      font-size: 15px;
    }

    .form-row button {
      height: 52px;
      padding: 0 20px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      color: #64748b;
      padding: 0 20px 40px;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .header {
        padding: 16px 20px;
        flex-direction: column;
      }

      .logo img {
        height: 56px;
      }

      .menu {
        gap: 16px;
        font-size: 13px;
      }

      .hero {
        margin-top: 40px;
      }

      .hero h1 {
        font-size: 36px;
      }

      .hero p {
        font-size: 16px;
      }

      .waitlist,
      .card {
        width: calc(100% - 24px);
      }

      .form-row {
        flex-direction: column;
      }

      .form-row button,
      .form-row input {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <img src="logo.png" alt="PFLX Pay Logo" />
    </div>

    <div class="menu">
      <a href="#features">Features</a>
      <a href="#how">How it works</a>
      <a href="#waitlist" class="btn-link">Join Waitlist</a>
    </div>
  </div>

  <div class="hero">
    <h1>Get paid globally</h1>
    <p>Simple crypto payments for freelancers</p>
    <button onclick="document.getElementById('waitlist').scrollIntoView({behavior:'smooth'})">
      Start Now
    </button>
  </div>

  <div class="card" id="features">
    Payment Preview
  </div>

  <div class="waitlist" id="waitlist">
    <h2>Join the waitlist</h2>
    <p>Be the first to know when PFLX Pay launches.</p>

    <form action="https://formspree.io/f/mdaywzgk" method="POST">
      <div class="form-row">
        <input type="email" name="email" placeholder="Enter your email" required>
        <button type="submit">Join</button>
      </div>
    </form>
  </div>

  <div class="footer" id="how">
    PFLX Pay © 2026
  </div>

</body>
</html>
