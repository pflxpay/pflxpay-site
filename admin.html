<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0XWD2SKcNbxCtm5xCgjMN2rASkDHddzU",
  authDomain: "pflxpay.firebaseapp.com",
  databaseURL: "https://pflxpay-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pflxpay",
  storageBucket: "pflxpay.firebasestorage.app",
  messagingSenderId: "302192444010",
  appId: "1:302192444010:web:cd933fe8f4cb8262890013"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");

function render(data){
  if(!data){
    list.innerHTML = "<div class='empty'>No payments yet</div>";
    return;
  }

  list.innerHTML = Object.entries(data).map(([id,p]) => `
    <div class="card">
      <div class="top">
        <div class="ref">${p.reference}</div>
        <div class="status">${p.status}</div>
      </div>

      <div class="grid">
        <div class="item"><div class="label">Amount</div><div>${p.amount} ${p.currency}</div></div>
        <div class="item"><div class="label">Date</div><div>${p.date}</div></div>
        <div class="item"><div class="label">Title</div><div>${p.title}</div></div>
        <div class="item"><div class="label">Wallet</div><div>${p.wallet}</div></div>
        <div class="item" style="grid-column:1/-1"><div class="label">Description</div><div>${p.description}</div></div>
      </div>

      <div class="actions">
        <button class="confirm" onclick="setStatus('${id}','confirmed')">Confirm</button>
        <button class="reject" onclick="setStatus('${id}','rejected')">Reject</button>
        <button class="delete" onclick="deletePayment('${id}')">Delete</button>
      </div>
    </div>
  `).join("");
}

onValue(ref(db, "payments"), snapshot => {
  render(snapshot.val());
});

window.setStatus = function(id,status){
  update(ref(db, "payments/"+id), { status });
};

window.deletePayment = function(id){
  remove(ref(db, "payments/"+id));
};
</script>
