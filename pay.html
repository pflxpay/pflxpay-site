<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0XWD2SKcNbxCtm5xCgjMN2rASkDHddzU",
  authDomain: "pflxpay.firebaseapp.com",
  databaseURL: "https://pflxpay-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pflxpay",
  storageBucket: "pflxpay.firebasestorage.app",
  messagingSenderId: "302192444010",
  appId: "1:302192444010:web:cd933fe8f4cb8262890013"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params=new URLSearchParams(window.location.search);
const amount=params.get("amount")||"0";
const currency=params.get("currency")||"USDT";
const title=params.get("title")||"Payment Request";
const description=params.get("description")||"";
const walletAddress="TQ71h8FKQXrFfDrRw4N2WqdEm4YesWWCAK";

document.getElementById("amount").textContent=amount+" "+currency;
document.getElementById("currency").textContent=currency;
document.getElementById("title").textContent=title;
document.getElementById("description").textContent=description;
document.getElementById("walletAddress").textContent=walletAddress;

document.getElementById("qrImage").src=
"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+encodeURIComponent(walletAddress);

window.copyWallet = function(){
  navigator.clipboard.writeText(walletAddress);
  document.getElementById("copyMessage").textContent="✅ Wallet copied.";
}

window.markAsPaid = function(){
  const refId = "PFLX-" + Date.now();

  push(ref(db, "payments"), {
    reference: refId,
    amount,
    currency,
    title,
    description,
    wallet: walletAddress,
    date: new Date().toLocaleString(),
    status: "pending"
  });

  document.getElementById("statusBox").style.display="block";
  document.getElementById("referenceId").textContent="Reference ID: " + refId;
  document.getElementById("copyMessage").textContent="✅ Payment sent!";
}
</script>
